{% extends 'base.html' %}

{% block title %}Visitor Analytics - 10,000 Records{% endblock %}

{% block extra_css %}
<style>
    :root {
        --primary-color: #c0392b;
        --card-bg: #ffffff;
        --bg-color: #f8f9fa;
        --border-color: #e0e0e0;
        --text-main: #2d3436;
        --text-muted: #636e72;
        --shadow: rgba(0,0,0,0.05);
    }

    .log-container {
        display: flex;
        flex-direction: column;
        gap: 20px;
        padding: 10px;
    }

    .toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 15px;
        background: var(--card-bg);
        padding: 15px 25px;
        border-radius: 12px;
        border: 1px solid var(--border-color);
    }

    .search-box {
        padding: 10px 15px;
        border-radius: 8px;
        border: 1px solid var(--border-color);
        background: var(--bg-color);
        color: var(--text-main);
        flex-grow: 1; /* Grow on mobile */
        max-width: 100%;
    }

    @media (min-width: 768px) {
        .search-box { width: 300px; flex-grow: 0; }
        .log-container { padding: 20px; }
    }

    /* Table & Responsive Card Styling */
    .table-card {
        background: var(--card-bg);
        border-radius: 12px;
        border: 1px solid var(--border-color);
        overflow: hidden;
        box-shadow: 0 4px 15px var(--shadow);
    }

    table {
        width: 100%;
        border-collapse: collapse;
    }

    /* Desktop Headers */
    thead th {
        background: var(--bg-color);
        padding: 15px;
        font-size: 0.8rem;
        text-transform: uppercase;
        color: var(--text-muted);
        border-bottom: 2px solid var(--border-color);
        text-align: left;
    }

    /* Mobile Transformation */
    @media (max-width: 767px) {
        thead { display: none; } /* Hide headers on mobile */
        
        tr {
            display: block;
            border-bottom: 8px solid var(--bg-color); /* Visual gap between cards */
            padding: 15px;
        }

        td {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #f1f1f1;
            text-align: right;
            font-size: 0.95rem;
        }

        td::before {
            content: attr(data-label); /* Pulls label from HTML attribute */
            font-weight: bold;
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 0.75rem;
            float: left;
        }

        td:last-child { border-bottom: none; }
    }

    /* Desktop Table Rows */
    @media (min-width: 768px) {
        td {
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
        }
        tr:hover { background: rgba(192, 57, 43, 0.03); }
    }

    /* Pagination UI */
    .pagination-bar {
        display: flex;
        flex-direction: column; /* Stack on mobile */
        gap: 15px;
        align-items: center;
        padding: 20px;
        background: var(--bg-color);
    }

    @media (min-width: 600px) {
        .pagination-bar { flex-direction: row; justify-content: space-between; }
    }

    .page-link {
        padding: 10px 20px;
        border-radius: 8px;
        border: 1px solid var(--border-color);
        background: var(--card-bg);
        cursor: pointer;
        font-weight: 600;
        transition: 0.3s;
    }

    .page-link:hover:not(:disabled) {
        background: var(--primary-color);
        color: white;
    }
</style>
{% endblock %}

{% block content %}
<div class="log-container">
    <div class="toolbar">
        <h2 style="margin:0; font-size: 1.5rem;">Traffic <span style="color:var(--primary-color)">Logs</span></h2>
        <input type="text" id="searchInput" class="search-box" placeholder="Search IP or Location..." onkeyup="handleSearch()">
    </div>

    <div class="table-card">
        <table>
            <thead>
                <tr>
                    <th># ID</th>
                    <th>Timestamp</th>
                    <th>IP Address</th>
                    <th>Location</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="logTableBody">
                </tbody>
        </table>

        <div class="pagination-bar">
            <div id="recordCount" style="font-size: 0.85rem; color: var(--text-muted);"></div>
            <div style="display: flex; gap: 10px; align-items: center;">
                <button class="page-link" id="prevBtn" onclick="changePage(-1)">←</button>
                <span id="pageIndicator" style="font-weight: bold;"></span>
                <button class="page-link" id="nextBtn" onclick="changePage(1)">→</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    const rawData = [];
    const locations = ["Mumbai, IN", "New York, US", "London, UK", "Tokyo, JP", "Berlin, DE", "Sydney, AU"];
    
    for (let i = 1; i <= 10000; i++) {
        rawData.push({
            id: i,
            time: new Date(Date.now() - i * 60000).toLocaleString('en-IN', { hour12: true, month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }),
            ip: `${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}...`,
            loc: locations[Math.floor(Math.random() * locations.length)],
            status: Math.random() > 0.1 ? "Success" : "Blocked"
        });
    }

    let filteredData = [...rawData];
    let currentPage = 1;
    const recordsPerPage = 10;

    function renderTable() {
        const tbody = document.getElementById('logTableBody');
        const start = (currentPage - 1) * recordsPerPage;
        const pageItems = filteredData.slice(start, start + recordsPerPage);

        tbody.innerHTML = "";
        
        pageItems.forEach(item => {
            // NOTE: data-label is used by CSS to show headers on mobile
            const row = `
                <tr>
                    <td data-label="ID" style="color: var(--primary-color); font-weight:bold;">#${item.id}</td>
                    <td data-label="Time">${item.time}</td>
                    <td data-label="IP" style="font-family: monospace;">${item.ip}</td>
                    <td data-label="Location">📍 ${item.loc}</td>
                    <td data-label="Status"><span style="color: ${item.status === 'Success' ? '#27ae60' : '#e74c3c'}">● ${item.status}</span></td>
                </tr>
            `;
            tbody.innerHTML += row;
        });

        updateControls();
    }

    function updateControls() {
        const totalPages = Math.ceil(filteredData.length / recordsPerPage);
        document.getElementById('pageIndicator').innerText = `${currentPage} / ${totalPages || 1}`;
        document.getElementById('recordCount').innerText = `${filteredData.length} records`;
        document.getElementById('prevBtn').disabled = currentPage === 1;
        document.getElementById('nextBtn').disabled = currentPage >= totalPages;
    }

    function changePage(step) {
        currentPage += step;
        renderTable();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function handleSearch() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        filteredData = rawData.filter(item => 
            item.ip.toLowerCase().includes(query) || 
            item.loc.toLowerCase().includes(query)
        );
        currentPage = 1;
        renderTable();
    }

    renderTable();
</script>
{% endblock %}
