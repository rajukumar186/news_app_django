{% extends 'base.html' %}

{% block content %}
<style>
    .reset-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 80vh;
        padding: 20px;
    }

    .reset-card {
        background: var(--card-bg);
        border: 1px solid var(--border-color);
        color: var(--text-main);
        width: 100%;
        max-width: 450px;
        padding: 40px;
        border-radius: 16px;
        box-shadow: 0 10px 30px var(--shadow);
        text-align: center;
    }

    .reset-icon {
        font-size: 3rem;
        color: var(--primary-color);
        margin-bottom: 20px;
    }

    .reset-card h2 {
        font-weight: 800;
        margin-bottom: 10px;
    }

    .reset-card p {
        color: var(--text-muted);
        font-size: 0.95rem;
        margin-bottom: 30px;
        line-height: 1.5;
    }

    /* Form Fields */
    .form-group {
        text-align: left;
        margin-bottom: 20px;
    }

    .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        font-size: 0.85rem;
        color: var(--text-muted);
    }

    input[type="email"] {
        width: 100%;
        padding: 14px;
        border-radius: 8px;
        border: 1px solid var(--border-color);
        background: var(--bg-color);
        color: var(--text-main);
        font-size: 1rem;
        box-sizing: border-box;
    }

    input:focus {
        outline: none;
        border-color: var(--primary-color);
        box-shadow: 0 0 0 3px rgba(192, 57, 43, 0.1);
    }

    .btn-reset {
        width: 100%;
        padding: 14px;
        background: var(--primary-color);
        color: white;
        border: none;
        border-radius: 8px;
        font-weight: 700;
        font-size: 1rem;
        cursor: pointer;
        transition: opacity 0.2s;
    }

    .btn-reset:hover {
        opacity: 0.9;
    }

    .back-to-login {
        display: block;
        margin-top: 25px;
        font-size: 0.9rem;
        color: var(--primary-color);
        text-decoration: none;
        font-weight: 600;
    }
</style>

<div class="reset-wrapper">
    <div class="reset-card">
        <div class="reset-icon">🔑</div>
        <h2>Reset Password</h2>
        <p>Forgotten your password? Enter your email address below, and we'll send you instructions to set a new one.</p>

        <form method="POST">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="id_email">Email Address</label>
                {{ form.email }}
                {% for error in form.email.errors %}
                    <small style="color: #e74c3c; display: block; margin-top: 5px;">{{ error }}</small>
                {% endfor %}
            </div>

            <button type="submit" class="btn-reset">Send Reset Link</button>
        </form>

        <a href="{% url 'login' %}" class="back-to-login">← Back to Login</a>
    </div>
</div>
{% endblock %}
