 

{% extends 'base.html' %}

{% block content %}
<style>
    .sent-wrapper { display: flex; justify-content: center; align-items: center; min-height: 70vh; padding: 20px; }
    .sent-card { 
        background: var(--card-bg); 
        border: 1px solid var(--border-color); 
        color: var(--text-main);
        padding: 40px; border-radius: 16px; text-align: center; max-width: 400px; 
    }
    .check-icon { font-size: 3.5rem; color: #27ae60; margin-bottom: 20px; }
</style>

<div class="sent-wrapper">
    <div class="sent-card">
        <div class="check-icon">📩</div>
        <h2>Check your inbox</h2>
        <p style="color: var(--text-muted); margin-top: 15px;">
            We've emailed you instructions for setting your password. If an account exists with the email you entered, you will receive it shortly.
        </p>
        <a href="{% url 'login' %}" style="color: var(--primary-color); text-decoration: none; font-weight: bold; display: block; margin-top: 20px;">Return to Login</a>
    </div>
</div>
{% endblock %}
