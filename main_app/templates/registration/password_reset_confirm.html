 

{% extends 'base.html' %}

{% block content %}
<style>
    .auth-wrapper { display: flex; justify-content: center; align-items: center; min-height: 80vh; }
    .auth-card { 
        background: var(--card-bg); 
        border: 1px solid var(--border-color); 
        padding: 40px; border-radius: 12px; width: 100%; max-width: 400px;
        color: var(--text-main);
    }
    input { 
        width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; 
        border: 1px solid var(--border-color); background: var(--bg-color); color: var(--text-main);
    }
    .btn-submit { width: 100%; padding: 12px; background: var(--primary-color); color: white; border: none; border-radius: 6px; cursor: pointer; }
</style>

<div class="auth-wrapper">
    <div class="auth-card">
        <h2>Set New Password</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn-submit">Update Password</button>
        </form>
    </div>
</div>
{% endblock %}
