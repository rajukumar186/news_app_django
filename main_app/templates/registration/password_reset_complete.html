 
{% extends 'base.html' %}

{% block content %}
<style>
    .complete-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 75vh;
        padding: 20px;
    }

    .complete-card {
        background: var(--card-bg);
        border: 1px solid var(--border-color);
        color: var(--text-main);
        width: 100%;
        max-width: 400px;
        padding: 40px;
        border-radius: 16px;
        box-shadow: 0 10px 30px var(--shadow);
        text-align: center;
        transition: background 0.3s ease;
    }

    .success-icon {
        width: 70px;
        height: 70px;
        background: rgba(39, 174, 96, 0.1); /* Subtle green bg */
        color: #27ae60;
        font-size: 2.5rem;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 25px auto;
    }

    .complete-card h2 {
        font-weight: 800;
        margin-bottom: 12px;
        font-size: 1.75rem;
    }

    .complete-card p {
        color: var(--text-muted);
        font-size: 1rem;
        line-height: 1.5;
        margin-bottom: 30px;
    }

    .btn-login {
        display: block;
        width: 100%;
        padding: 14px;
        background: var(--primary-color, #c0392b);
        color: white;
        text-decoration: none;
        border-radius: 8px;
        font-weight: 700;
        font-size: 1rem;
        transition: opacity 0.2s;
    }

    .btn-login:hover {
        opacity: 0.9;
        color: white; /* Ensures text stays white if base.html has specific link colors */
    }
</style>

<div class="complete-wrapper">
    <div class="complete-card">
        <div class="success-icon">
            ✓
        </div>
        <h2>Password Set!</h2>
        <p>Your password has been successfully updated. You can now log in to your account with your new credentials.</p>

        <a href="{% url 'login' %}" class="btn-login">Log In Now</a>
    </div>
</div>
{% endblock %}
